<!DOCTYPE html>

<html>
<head>
<title>Dish Discovery</title>
<style>
body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #fdfdfd; padding: 40px; }
.search-box { margin-bottom: 30px; }
input { padding: 12px; width: 350px; border-radius: 25px; border: 1px solid #ccc; outline: none; }
button { padding: 12px 25px; background: #ff6b6b; color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; }
button:hover { background: #ee5253; }
.recipe-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
.recipe-card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
img { width: 100%; border-radius: 10px; margin-bottom: 10px; }
h3 { color: #2d3436; font-size: 1.1rem; }
</style>
</head>
<body>
<h1>🍳 Dish Discovery</h1>
<p>What's in your fridge? Enter ingredients to find recipes.</p>

<div class="search-box">
    <input type="text" id="ingredients" placeholder="e.g. chicken, tomato, garlic">
    <button onclick="search()">Find Recipes</button>
</div>

<div id="results" class="recipe-grid"></div>

<script>
    async function search() {
        const ing = document.getElementById('ingredients').value;
        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = "<p>Searching for delicious ideas...</p>";

        try {
            // This connects to your Python backend running on port 8000
            const response = await fetch(`http://127.0.0.1:8000/find-recipes?ingredients=${ing}`);
            const data = await response.json();
            
            let html = '';
            data.forEach(recipe => {
                html += `
                    <div class="recipe-card">
                        <img src="${recipe.image}" alt="${recipe.title}">
                        <h3>${recipe.title}</h3>
                    </div>`;
            });
            resultsDiv.innerHTML = html || "<p>No recipes found. Try different ingredients!</p>";
        } catch (error) {
            resultsDiv.innerHTML = "<p style='color:red'>Error: Make sure your Python backend is running!</p>";
        }
    }
</script>
</body>
</html>
